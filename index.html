<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Água</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">💧</div>
                <h1>Controle de Água</h1>
                <p>Sistema de Cobrança de Tarifas</p>
            </div>

            <div class="login-error" id="login-error"></div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="btn-login">
                    Entrar
                </button>
            </form>

            <div class="login-footer">
                <p>Não tem conta? <a href="#" id="show-register">Criar conta</a></p>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!initSupabase()) {
                console.error('Erro ao inicializar Supabase');
                return;
            }

            const user = await Auth.getUser();
            if (user) {
                window.location.href = 'painel.html';
                return;
            }

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const errorDiv = document.getElementById('login-error');
                const btn = document.getElementById('btn-login');

                btn.textContent = 'Entrando...';
                btn.disabled = true;
                errorDiv.classList.remove('show');

                try {
                    await Auth.login(email, password);
                    window.location.href = 'painel.html';
                } catch (error) {
                    errorDiv.textContent = error.message || 'Erro ao fazer login';
                    errorDiv.classList.add('show');
                    btn.textContent = 'Entrar';
                    btn.disabled = false;
                }
            });

            document.getElementById('show-register').addEventListener('click', async (e) => {
                e.preventDefault();
                const email = prompt('Email:');
                if (!email) return;

                const password = prompt('Senha (mínimo 6 caracteres):');
                if (!password || password.length < 6) {
                    alert('Senha deve ter no mínimo 6 caracteres');
                    return;
                }

                const nome = prompt('Nome completo:');
                if (!nome) return;

                try {
                    await Auth.register(email, password, nome);
                    alert('Conta criada com sucesso! Verifique seu email para confirmar.');
                } catch (error) {
                    alert('Erro ao criar conta: ' + error.message);
                }
            });
        });
    </script>
</body>
</html>
