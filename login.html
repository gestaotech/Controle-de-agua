<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Água</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1976D2 0%, #2196F3 50%, #64B5F6 100%);
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            font-size: 1.8rem;
            color: #1976D2;
            margin-bottom: 5px;
        }
        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }
        .login-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .login-form .form-group {
            margin-bottom: 20px;
        }
        .login-form .form-group label {
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }
        .login-form .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .login-form .form-group input:focus {
            outline: none;
            border-color: #1976D2;
        }
        .login-form .btn-primary {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            margin-top: 10px;
        }
        .login-error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .demo-credentials {
            margin-top: 25px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .demo-credentials h4 {
            margin-bottom: 10px;
            color: #333;
        }
        .demo-credentials p {
            margin: 5px 0;
            color: #666;
        }
        .demo-credentials strong {
            color: #1976D2;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">💧</div>
            <h1>Controle de Água</h1>
            <p>Sistema de Cobrança de Tarifas</p>
        </div>

        <div class="login-error" id="login-error">
            Usuário ou senha incorretos!
        </div>

        <form class="login-form" id="login-form">
            <div class="form-group">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" placeholder="Digite seu usuário" required autofocus>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>

        <div class="demo-credentials">
            <h4>Credenciais de teste:</h4>
            <p><strong>Admin:</strong> admin / admin123</p>
            <p><strong>Leitor:</strong> leitor / leitor123</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = JSON.parse(localStorage.getItem('session'));
            if (session) {
                window.location.href = 'index.html';
                return;
            }

            const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
            if (usuarios.length === 0) {
                localStorage.setItem('usuarios', JSON.stringify([
                    { id: '1', usuario: 'admin', senha: 'admin123', nome: 'Administrador', perfil: 'admin', ativo: true },
                    { id: '2', usuario: 'leitor', senha: 'leitor123', nome: 'Funcionário Leitor', perfil: 'leitor', ativo: true }
                ]));
            }

            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const usuario = document.getElementById('usuario').value.trim();
                const senha = document.getElementById('senha').value;

                const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
                const user = usuarios.find(u => u.usuario === usuario && u.senha === senha && u.ativo);

                if (user) {
                    const session = {
                        id: user.id,
                        usuario: user.usuario,
                        nome: user.nome,
                        perfil: user.perfil,
                        loginEm: new Date().toISOString()
                    };
                    localStorage.setItem('session', JSON.stringify(session));
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
